<div class="contact-wrap">
  <div class="contact-inner">
    <h2>Contact</h2>

    <!-- Formsubmit.co: no account needed.
         On first submission you'll receive an activation email to click (only the first time).
         After that all messages arrive directly at daniilangelo.bravi@gmail.com -->
    <form action="https://formsubmit.co/daniilangelo.bravi@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New message from the website">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://daniilangelobravi.com/en/contact.html?sent=1">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" class="btn-send">Send</button>

    </form>
  </div>
</div>
