<div class="contact-wrap">
  <div class="contact-inner">
    <h2>Contatti</h2>

    <!-- Formsubmit.co: nessun account necessario.
         Al primo invio riceverai un'email di attivazione da cliccare (solo la prima volta).
         Poi tutti i messaggi arrivano direttamente a daniilangelo.bravi@gmail.com -->
    <form action="https://formsubmit.co/daniilangelo.bravi@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Nuovo messaggio dal sito">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://daniilangelobravi.com/contact.html?sent=1">

      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="message">Messaggio</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" class="btn-send">Invia</button>

    </form>
  </div>
</div>
